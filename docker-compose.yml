# ─────────────────────────────────────────────────────────────────────────────
# Runs FastAPI app, Prometheus, and Grafana.
#
# LAB 1: docker compose up -d prometheus
# LAB 2: docker compose up -d   (starts all services)
# ─────────────────────────────────────────────────────────────────────────────

services:

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090" # Prometheus UI → http://localhost:9090
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle" # allows POST /-/reload to hot-reload config
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000" # Grafana UI → http://localhost:3000
    environment:
      - GF_SECURITY_ADMIN_USER= admin
      - GF_SECURITY_ADMIN_PASSWORD= admin
      - GF_USERS_ALLOW_SIGN_UP=false
      # Enable unified alerting (required for Lab 3 Task 3)
      - GF_UNIFIED_ALERTING_ENABLED=true
      - GF_ALERTING_ENABLED=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
